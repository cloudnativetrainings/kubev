# https://github.com/kubermatic/community-components/blob/master/examples/kubermatic-virtualization/kubev/kubev.yaml
apiVersion: virtualization.k8c.io/v1alpha1
kind: KubeVCluster
networkConfiguration:
  dnsServerIP: "169.254.169.254"
  networkCIDR: "172.25.0.0/24"
  gatewayIP: "172.25.0.1"
  # serviceCIDR: "192.168.0.0/16"
controlPlane:
  hosts:
    - address: "<FILL-IN-INTERNAL-IP-OF-CP-VM>"
      sshUsername: "root"
      sshPrivateKeyFile: "/root/.ssh/gcp-kubev"
staticWorkers:
  hosts:
    - address: "<FILL-IN-INTERNAL-IP-OF-WORKER-VM>"
      sshUsername: "root"
      sshPrivateKeyFile: "/root/.ssh/gcp-kubev"
loadBalancer:
  metallb:
    # TODO ext ips from gce
    ipRange: "10.156.0.200-10.156.0.204"
storage:
  longhorn: {}
