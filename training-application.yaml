apiVersion: apps/v1
kind: Deployment
metadata:
  name: training-application
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: training-application
  template:
    metadata:
      labels:
        app: training-application
    spec:
      containers:
        - name: training-application
          image: quay.io/kubermatic-labs/training-application:4.0.0
          imagePullPolicy: Always
          tty: true
          stdin: true
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
            limits:
              cpu: 100m
              memory: 100Mi
          ports:
            - name: http
              containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: training-application
  namespace: default
  annotations:
    metallb.io/address-pool: vpc-vms
spec:
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: training-application
  type: LoadBalancer
