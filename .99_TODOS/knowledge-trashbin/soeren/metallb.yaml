---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: vpc-vms
  namespace: metallb-system
spec:
  addresses:
    # This is a range of IP addresses from your external network that MetalLB can use.
    # Make sure this range is reserved for MetalLB and does not conflict with other devices.
    - 192.168.99.100/32
    - 192.168.99.101/32
    - 192.168.99.102/32

---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: vpc-vms-advertisement
  namespace: metallb-system
spec:
  # This tells MetalLB to advertise the IPs from the pool we just created
  # using L2 (ARP). This is simpler for a single-subnet setup.
  ipAddressPools:
    - vpc-vms

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-fileserver
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-fileserver
  template:
    metadata:
      labels:
        app: nginx-fileserver
    spec:
      containers:
      - name: nginx
        image: nginx:stable
        ports:

---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  annotations:
    metallb.io/address-pool: vpc-vms
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: nginx-fileserver
  type: LoadBalancer