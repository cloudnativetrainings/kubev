---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: macvlan
  namespace: default
spec:
  config: '{
      "cniVersion": "0.3.0",
      "type": "macvlan",
      "master": "eth0",
      "mode": "bridge",
      "ipam": {
        "type": "kube-ovn",
        "server_socket": "/run/openvswitch/kube-ovn-daemon.sock",
        "provider": "macvlan.default"
      }
    }'

---
apiVersion: kubeovn.io/v1
kind: Subnet
metadata:
  name: macvlan
spec:
  protocol: IPv4
  provider: macvlan.default
  cidrBlock: 192.168.99.0/24
  gateway: 192.168.99.1
  excludeIps:
  - 192.168.99.0..192.168.99.40

---
apiVersion: v1
kind: Pod
metadata:
  name: samplepod
  namespace: default
  annotations:
    # ovn.kubernetes.io/logical_switch: macvlan
    k8s.v1.cni.cncf.io/networks: "default/macvlan"
spec:
  containers:
  - name: netshoot
    image: nicolaka/netshoot:latest
    command: ["sleep", "3600"]